reason = 'Dependency of the superseded nvim-cmp stack.'

[[rejected]]
repo = 'hrsh7th/vim-vsnip'
reason = 'Only supported the superseded nvim-cmp stack.'

[[rejected]]
repo = 'yetone/avante.nvim'
reason = 'Runtime networking and credentials belong in the host Codex tab.'

[[rejected]]
repo = 'nvim-lua/plenary.nvim'
reason = 'Was only needed by Avante in the imported configuration.'

[[rejected]]
repo = 'MunifTanjim/nui.nvim'
reason = 'Was only needed by Avante in the imported configuration.'

[[rejected]]
repo = 'akinsho/toggleterm.nvim'
reason = 'Shells and test runners belong in host-side Zellij tabs.'

[[rejected]]
repo = 'zk-org/zk-nvim'
reason = 'Requires an external binary and notebook storage outside the narrow mount.'

[[rejected]]
repo = 'nvim-telescope/telescope.nvim'
reason = 'Current workbench finder superseded by the adopted ddu interface.'
origin = 'current-workbench'

