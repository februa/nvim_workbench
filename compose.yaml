name: nvim-workbench

services:
  editor:
    image: ${NVIM_IMAGE:-nvim-workbench:2026-07-dpp-candidate}
    build:
      context: .
    entrypoint: ["nvim"]
    working_dir: /workspace
    stdin_open: true
    tty: true
    network_mode: none
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/nvim
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      NVIM_CONTAINER: "1"
      NVIM_NERD_FONT: ${NVIM_NERD_FONT:-0}
      TERM: ${TERM:-xterm-256color}
      COLORTERM: ${COLORTERM:-truecolor}
    volumes:
      - type: bind
        source: ${PROJECT_DIR:-.}
        target: /workspace
      - type: volume
        source: global-shada
        target: /home/nvim/.local/state/nvim/shada
    tmpfs:
      - /tmp:mode=1777
      - /home/nvim/.cache:uid=1000,gid=1000,mode=0700
      - /home/nvim/.local/state/nvim:uid=1000,gid=1000,mode=0700
      - /opt/deno-cache/import_map_importer:uid=1000,gid=1000,mode=0700

volumes:
  global-shada:
    name: nvim-workbench-shada
