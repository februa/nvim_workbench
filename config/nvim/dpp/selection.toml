# Plugin selection ledger for the Windows 11 configuration import.
#
# Keep the sections in this order: adopted, rejected, deferred.
# Runtime installation is still controlled by core.tsv and plugins.toml. To
# promote a deferred plugin, follow docs/windows11-import.md and then move its
# entry to adopted.

# 採用: frozen into the image and loaded from the build-time dpp state.
[[adopted]]
repo = 'Shougo/dpp.vim'
reason = 'Core plugin manager.'

[[adopted]]
repo = 'vim-denops/denops.vim'
reason = 'Required runtime for dpp and ddu.'

[[adopted]]
repo = 'Shougo/dpp-ext-installer'
reason = 'Used only while assembling the image.'

[[adopted]]
repo = 'Shougo/dpp-ext-lazy'
reason = 'Generates the frozen dpp state.'

[[adopted]]
repo = 'Shougo/dpp-ext-toml'
reason = 'Loads the pinned TOML plugin definition.'

[[adopted]]
repo = 'Shougo/dpp-protocol-git'
reason = 'Restores exact Git revisions during the image build.'

[[adopted]]
repo = 'Shougo/ddu.vim'
reason = 'Core finder and filer framework.'

[[adopted]]
repo = 'Shougo/ddu-ui-ff'
reason = 'Primary finder UI.'

[[adopted]]
repo = 'Shougo/ddu-source-file_rec'
reason = 'Recursive file source.'

[[adopted]]
repo = 'Shougo/ddu-source-buffer'
reason = 'Buffer source.'

[[adopted]]
repo = 'Shougo/ddu-source-file_old'
reason = 'Recent-file source.'

[[adopted]]
repo = 'Shougo/ddu-source-line'
reason = 'Current-buffer line source.'

[[adopted]]
repo = 'Shougo/ddu-source-rg'
reason = 'Project text-search source backed by the baked ripgrep binary.'

[[adopted]]
repo = 'Shougo/ddu-kind-file'
reason = 'File actions shared by finder and filer.'

[[adopted]]
repo = 'Shougo/ddu-filter-matcher_substring'
reason = 'Simple deterministic matching without another fuzzy dependency.'

[[adopted]]
repo = 'Shougo/ddu-column-filename'
reason = 'Default filename display when client Nerd Font support is not declared.'

[[adopted]]
repo = 'Shougo/ddu-ui-filer'
reason = 'ddu-native file browser.'

[[adopted]]
repo = 'Shougo/ddu-source-file'
reason = 'Filesystem source used by the filer.'

[[adopted]]
repo = 'vim-jp/vimdoc-ja'
reason = 'Retains Japanese help.'

[[adopted]]
repo = 'j-hui/fidget.nvim'
reason = 'Lightweight LSP progress feedback.'

[[adopted]]
repo = 'haya14busa/vim-asterisk'
reason = 'Retains search-word behavior and mappings.'

[[adopted]]
repo = 'windwp/nvim-autopairs'
reason = 'Small editing primitive with no external runtime.'

[[adopted]]
repo = 'lewis6991/gitsigns.nvim'
reason = 'Editor-local diff signs; repository operations remain on the host.'

[[adopted]]
repo = 'kylechui/nvim-surround'
reason = 'Retains structural editing behavior.'

[[adopted]]
repo = 'neovim/nvim-lspconfig'
reason = 'Configures language servers already baked into the image.'

[[adopted]]
repo = 'nvim-treesitter/nvim-treesitter'
reason = 'Parsers are compiled and frozen during the image build.'

[[adopted]]
repo = 'stevearc/conform.nvim'
reason = 'Configures formatters already baked into the image.'

[[adopted]]
repo = 'masisz/wisteria.nvim'
reason = 'Single colorscheme retained from the previous active Windows setting.'

[[adopted]]
repo = 'nvim-lualine/lualine.nvim'
reason = 'Compact statusline with runtime-selected plain or Nerd Font display.'

[[adopted]]
repo = 'folke/which-key.nvim'
reason = 'Displays only the key groups that exist in the current workbench.'

[[adopted]]
repo = 'MeanderingProgrammer/render-markdown.nvim'
reason = 'Uses the already frozen Markdown parsers and selects symbols at runtime.'

[[adopted]]
repo = 'nvim-tree/nvim-web-devicons'
reason = 'Frozen into the image; loaded only when NVIM_NERD_FONT=1 declares client font support.'

[[adopted]]
repo = 'ryota2357/ddu-column-icon_filename'
reason = 'Frozen icon column selected at runtime; the plain filename column remains the default.'

# 不採用: conflicts with the workbench boundary or is superseded.
[[rejected]]
